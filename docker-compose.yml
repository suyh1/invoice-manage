name: invoice-ocr

x-app-image: &app-image ${APP_IMAGE:-docker.io/nathan974/invoice-ocr-app:0.2.5}

x-postgres-credentials: &postgres-credentials
  POSTGRES_DB: invoice_app
  POSTGRES_USER: invoice_app
  POSTGRES_PASSWORD: change-me

x-app-environment: &app-environment
  <<: *postgres-credentials
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  OCR_CONFIG_ENCRYPTION_KEY: change-me-use-openssl-rand-base64-32

services:
  storage-init:
    image: *app-image
    user: '0:0'
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        mkdir -p /data/uploads /data/exports /data/tmp &&
        chown -R invoice:invoice /data/uploads /data/exports /data/tmp
    volumes:
      - app_uploads:/data/uploads
      - app_exports:/data/exports
      - app_tmp:/data/tmp
    restart: 'no'

  app:
    image: *app-image
    container_name: invoice-ocr-app
    command: ['web']
    environment:
      <<: *app-environment
      APP_SECRET_KEY: change-me-use-openssl-rand-hex-32
    depends_on:
      storage-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # 只修改左侧的宿主机端口，容器端口保持 8080。
      - '8080:8080'
    volumes:
      - app_uploads:/data/uploads
      - app_exports:/data/exports
      - app_tmp:/data/tmp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8080/readyz'', timeout=2)"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    image: *app-image
    container_name: invoice-ocr-worker
    command: ['worker']
    environment: *app-environment
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/data/uploads
      - app_exports:/data/exports
      - app_tmp:/data/tmp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16.3-bookworm
    container_name: invoice-ocr-postgres
    environment: *postgres-credentials
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-bookworm
    container_name: invoice-ocr-redis
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_exports:
  app_tmp:
  app_uploads:
  postgres_data:
  redis_data:
