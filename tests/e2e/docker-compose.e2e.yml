name: invoice-ocr-e2e

x-app-env: &app-env
  APP_ENV: test
  APP_BASE_URL: http://app:8080
  APP_SECRET_KEY: e2e-app-secret-change-me
  DATABASE_URL: postgresql+psycopg://invoice_app:change-me@postgres:5432/invoice_app
  EXPORT_PATH: /data/exports
  OCR_CONFIG_ENCRYPTION_KEY: e2e-ocr-config-encryption-key-change-me
  REDIS_URL: redis://redis:6379/0
  SESSION_COOKIE_SECURE: "false"
  STORAGE_PATH: /data/uploads
  TMP_PATH: /data/tmp
  WORKER_CONCURRENCY: "1"

x-app-build: &app-build
  context: ../..
  dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16.3-bookworm
    environment:
      POSTGRES_DB: invoice_app
      POSTGRES_PASSWORD: change-me
      POSTGRES_USER: invoice_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_app -d invoice_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-bookworm
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    image: invoice-ocr-e2e-app
    platform: linux/amd64
    build: *app-build
    command: ["web"]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)\""]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "18090:8080"
    volumes:
      - app_uploads:/data/uploads
      - app_exports:/data/exports
      - app_tmp:/data/tmp

  worker:
    image: invoice-ocr-e2e-app
    platform: linux/amd64
    command: ["worker"]
    environment:
      <<: *app-env
      MOCK_OCR_FIXTURE_PATH: /e2e/fixtures/vat_invoice_success.json
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./fixtures:/e2e/fixtures:ro
      - app_uploads:/data/uploads
      - app_exports:/data/exports
      - app_tmp:/data/tmp

  e2e:
    image: node:24.13.0-bookworm-slim
    platform: linux/amd64
    working_dir: /e2e
    command: ["node", "--experimental-strip-types", "/e2e/invoice_flow.spec.ts"]
    environment:
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: e2e-admin-password-123
      APP_BASE_URL: http://app:8080
      MEMBER_EMAIL: member@example.com
      MEMBER_PASSWORD: e2e-member-password-123
    depends_on:
      app:
        condition: service_healthy
      worker:
        condition: service_started
    volumes:
      - ./:/e2e:ro

volumes:
  app_exports:
  app_tmp:
  app_uploads:
  postgres_data:
  redis_data:
